<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>Mindly</h1>
            <p>Organiza tus tareas, hábitos y metas en un solo lugar.</p>
        </header>

        <div class="card">

            <input type="text" id="taskInput" placeholder="Escribe una tarea...">

            <button onclick="addTask()">
                Agregar tarea
            </button>

            <ul id="taskList"></ul>

            <div class="counter">
                Tareas completadas:
                <span id="completed">0</span>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
